<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>改善案・バグ報告｜買う前比較表</title>
  <meta name="description" content="買う前比較表の改善案・バグ報告ページです。" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="static-page">
    <article class="static-card feedback-box">
      <p class="eyebrow">Feedback</p>
      <h1>改善案・バグ報告</h1>
      <p>使いにくいところ、欲しい機能、表示崩れなどがあれば、下のテンプレートを編集して共有してください。</p>

      <label>
        報告テンプレート
        <textarea id="feedbackText">【買う前比較表 フィードバック】

■ 気になったところ

■ 使っている端末・ブラウザ
例：iPhone / Android / Windows Chrome など

■ こうなると便利だと思ったこと

</textarea>
      </label>

      <div class="static-actions">
        <button id="copyFeedbackBtn" type="button" class="secondary">テンプレートをコピー</button>
        <a id="xFeedbackLink" class="primary button-link" href="https://x.com/intent/tweet?text=%E3%80%90%E8%B2%B7%E3%81%86%E5%89%8D%E6%AF%94%E8%BC%83%E8%A1%A8%20%E3%83%95%E3%82%A3%E3%83%BC%E3%83%89%E3%83%90%E3%83%83%E3%82%AF%E3%80%91%0A%0A%23%E8%B2%B7%E3%81%86%E5%89%8D%E6%AF%94%E8%BC%83%E8%A1%A8" target="_blank" rel="noopener">Xで共有する</a>
        <a class="secondary button-link" href="index.html">アプリに戻る</a>
      </div>
    </article>
  </main>

  <script>
    const textarea = document.getElementById('feedbackText');
    const copyBtn = document.getElementById('copyFeedbackBtn');
    const xLink = document.getElementById('xFeedbackLink');

    function updateXLink() {
      const text = textarea.value.trim() || '【買う前比較表 フィードバック】';
      xLink.href = `https://x.com/intent/tweet?text=${encodeURIComponent(text + '\n\n#買う前比較表')}`;
    }

    textarea.addEventListener('input', updateXLink);
    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(textarea.value);
        copyBtn.textContent = 'コピーしました';
        setTimeout(() => copyBtn.textContent = 'テンプレートをコピー', 1400);
      } catch {
        textarea.select();
        document.execCommand('copy');
      }
    });
    updateXLink();
  </script>
</body>
</html>
